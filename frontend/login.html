<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }

        .glass-card {
            background-color: #1e293b; /* Slate 800 */
            border-radius: 20px;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tab-active {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tab-inactive {
            background: transparent;
            color: #94a3b8; /* Slate 400 */
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card p-8 max-w-md w-full">
        <!-- Logo & Title -->
        <div class="text-center mb-8 pb-6 border-b border-gray-700">
            <div class="text-6xl mb-4 drop-shadow-lg">🚘</div>
            <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">Smart Parking System</h1>
            <p class="text-gray-400 font-medium">Classic AI-Powered Management</p>
        </div>

        <!-- Tab Switcher -->
        <div class="flex mb-6 bg-[#0f172a] rounded-lg p-1 border border-gray-700">
            <button id="loginTab" onclick="switchTab('login')"
                class="flex-1 py-2.5 px-4 rounded-lg font-semibold transition tab-active">
                Sign In
            </button>
            <button id="registerTab" onclick="switchTab('register')"
                class="flex-1 py-2.5 px-4 rounded-lg font-semibold transition tab-inactive hover:text-gray-200">
                Create Account
            </button>
        </div>

        <!-- Success/Error Messages -->
        <div id="message" class="hidden mb-6 p-4 rounded-lg font-medium text-sm"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    Email Address
                </label>
                <input type="email" id="loginEmail" required
                    class="w-full px-4 py-3 bg-[#0f172a] border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition placeholder-gray-500"
                    placeholder="admin@parksmart.test" />
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    Password
                </label>
                <div class="relative">
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-3 bg-[#0f172a] border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition placeholder-gray-500"
                        placeholder="••••••••" />
                    <button type="button" onclick="togglePassword('loginPassword')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-gray-300 transition">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-blue-600 text-white py-3.5 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
                Log In to Dashboard
            </button>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    Full Name
                </label>
                <input type="text" id="registerName" required
                    class="w-full px-4 py-3 bg-[#0f172a] border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition placeholder-gray-500"
                    placeholder="John Doe" />
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    Email Address
                </label>
                <input type="email" id="registerEmail" required
                    class="w-full px-4 py-3 bg-[#0f172a] border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition placeholder-gray-500"
                    placeholder="your@email.com" />
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-300 mb-2">
                    Secure Password
                </label>
                <div class="relative">
                    <input type="password" id="registerPassword" required minlength="8"
                        class="w-full px-4 py-3 bg-[#0f172a] border border-gray-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition placeholder-gray-500"
                        placeholder="••••••••" />
                    <button type="button" onclick="togglePassword('registerPassword')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-gray-300 transition">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-2 font-medium bg-gray-900/50 p-2 rounded border border-gray-800">Minimum 8 chars, must include both a letter AND a number.</p>
            </div>

            <button type="submit" id="registerBtn"
                class="w-full bg-blue-600 text-white py-3.5 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
                Create Account
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-gray-500 font-medium">
            <p>Protected by Enterprise JWT Authentication</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://localhost:8000/api/v1";

        // Check if already logged in
        window.onload = function () {
            const token = localStorage.getItem('access_token');
            if (token) {
                // Verify token is still valid
                fetch(`${BACKEND_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                    .then(response => {
                        if (response.ok) {
                            // Token valid, redirect to dashboard
                            window.location.href = 'dashboard.html';
                        } else {
                            // Token invalid, clear it
                            localStorage.removeItem('access_token');
                            localStorage.removeItem('refresh_token');
                        }
                    })
                    .catch(error => {
                        console.error('Token verification failed:', error);
                    });
            }
        };

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const message = document.getElementById('message');

            message.classList.add('hidden');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = 'flex-1 py-2 px-4 rounded-lg font-semibold transition tab-active';
                registerTab.className = 'flex-1 py-2 px-4 rounded-lg font-semibold transition tab-inactive';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.className = 'flex-1 py-2 px-4 rounded-lg font-semibold transition tab-inactive';
                registerTab.className = 'flex-1 py-2 px-4 rounded-lg font-semibold transition tab-active';
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `mb-4 p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                }`;
            message.classList.remove('hidden');
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch(`${BACKEND_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    showMessage('Login successful! Redirecting...', 'success');

                    console.log('Login successful, redirecting to dashboard...');
                    console.log('Token stored:', localStorage.getItem('access_token'));

                    // Redirect to dashboard after 1 second
                    setTimeout(() => {
                        console.log('Attempting redirect...');
                        const dashboardUrl = window.location.href.replace('login.html', 'dashboard.html');
                        console.log('Redirecting to:', dashboardUrl);
                        window.location.href = dashboardUrl;
                    }, 1000);
                } else {
                    const errorData = await response.json();
                    showMessage(errorData.detail || 'Login failed. Please check your credentials.', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please check if backend is running.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const btn = document.getElementById('registerBtn');

            btn.disabled = true;
            btn.textContent = 'Registering...';

            try {
                const response = await fetch(`${BACKEND_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password })
                });

                if (response.ok) {
                    showMessage('Registration successful! Please login.', 'success');

                    // Switch to login tab after 1.5 seconds
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginEmail').value = email;
                    }, 1500);
                } else {
                    const errorData = await response.json();
                    // Handle error message properly
                    let errorMsg = 'Registration failed.';
                    if (errorData.detail) {
                        if (typeof errorData.detail === 'string') {
                            errorMsg = errorData.detail;
                        } else if (typeof errorData.detail === 'object') {
                            errorMsg = JSON.stringify(errorData.detail);
                        }
                    }
                    showMessage(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please check if backend is running.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Register';
            }
        }
    </script>
</body>

</html>
